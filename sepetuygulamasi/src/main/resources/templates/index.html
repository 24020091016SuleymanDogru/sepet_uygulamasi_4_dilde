<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ana Sayfa - Ürünler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 1rem 3rem rgba(0,0,0,.175)!important; }
        .btn-add-cart { transition: background-color 0.2s ease; }
        .btn-add-cart:hover { background-color: #0d6efd !important; border-color: #0d6efd !important; }
    </style>
</head>
<body>
<div class="container mt-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 border-bottom pb-4">
        <div>
            <h1 class="display-6 fw-bold mb-1">🎮 Oyuncu Ekipmanları & Donanım</h1>
            <p class="text-muted mb-0">İhtiyacın olan en sağlam donanımları keşfet ve anında sepete at.</p>
        </div>
        <div>
            <a th:href="@{/sepet}" class="btn btn-warning btn-lg rounded-pill shadow-sm fw-bold px-4 py-2 d-flex align-items-center gap-2">
                <span class="fs-4">🛒</span> Sepetime Git
            </a>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mb-5">

        <div class="col" th:each="urun : ${urunler}">
            <div class="card h-100 shadow-sm border-0 rounded-4 product-card overflow-hidden">
                <div class="bg-light d-flex align-items-center justify-content-center border-bottom" style="height: 180px;">
                    <span style="font-size: 4rem;">📦</span>
                </div>
                <div class="card-body d-flex flex-column text-center p-4">
                    <h5 class="card-title fw-bold text-dark mb-2" th:text="${urun.urunAdi}">Ürün Adı</h5>
                    <div class="mt-auto mb-4 mt-3">
                        <span class="fs-3 fw-bolder text-primary" th:text="${urun.fiyat} + ' ₺'">0.00 ₺</span>
                    </div>

                    <form method="post" th:action="@{/sepete-ekle}" class="w-100">
                        <input type="hidden" name="urunId" th:value="${urun.urunId}" />
                        <button type="submit" class="btn btn-dark w-100 rounded-pill fw-semibold py-2 shadow-sm d-flex justify-content-center align-items-center gap-2 btn-add-cart">
                            <span>➕</span> Sepete Ekle
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
